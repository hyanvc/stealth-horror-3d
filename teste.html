<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Stealth Horror - A Invasão Noturna</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.5); font-size: 24px; pointer-events: none;}
        #ui { position: absolute; top: 20px; left: 20px; font-size: 20px; text-shadow: 2px 2px 0 #000; pointer-events: none;}
        #aviso { position: absolute; bottom: 20%; width: 100%; text-align: center; font-size: 24px; color: #ffeb3b; text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 5;}
        
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #menu h1 { color: #d32f2f; font-size: 50px; margin-bottom: 10px;}
        #menu p { font-size: 20px; max-width: 600px; text-align: center; margin-bottom: 30px;}
        #btn-iniciar { padding: 15px 30px; font-size: 20px; background: #d32f2f; color: white; border: none; cursor: pointer; font-family: inherit; font-weight: bold;}
        #btn-iniciar:hover { background: #f44336; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="menu">
        <h1 id="titulo-tela">O ROUBO</h1>
        <p id="desc-tela">Aproxime-se da casa e aperte [F] para interagir com portas. Lá dentro, roube os 3 móveis com [E] e <b>FUJA PELA PORTA DA FRENTE</b>. Mas cuidado: o velho está dormindo e pode acordar!</p>
        <button id="btn-iniciar">CLIQUE PARA JOGAR</button>
    </div>

    <div id="ui">
        Ambiente: <span id="hud-ambiente">EXTERIOR (DIA)</span><br>
        Móveis Roubados: <span id="hud-itens">0</span>/3
    </div>
    <div id="crosshair">+</div>
    <div id="aviso" class="hidden">Aperte [AÇÃO]</div>
    <canvas id="c"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>

    <script>
        const canvas = document.querySelector("#c");
        const gl = canvas.getContext("webgl2");

        // --- SHADERS MANTIDOS DA SUA ARQUITETURA ---
        const vs = `#version 300 es
            layout(location=0) in vec3 a_pos;
            layout(location=1) in vec2 a_tex;
            layout(location=2) in vec3 a_norm;
            uniform mat4 u_matrix; uniform mat4 u_model;
            out vec2 v_tex; out vec3 v_norm; out vec3 v_fragPos;
            void main() { gl_Position = u_matrix * vec4(a_pos, 1.0); v_tex = a_tex; v_fragPos = vec3(u_model * vec4(a_pos, 1.0)); v_norm = mat3(transpose(inverse(u_model))) * a_norm; }
        `;
        const fs = `#version 300 es
            precision highp float;
            in vec2 v_tex; in vec3 v_norm; in vec3 v_fragPos;
            uniform sampler2D u_texture; uniform vec3 u_lightPos; uniform float u_ambientLvl; uniform vec3 u_lightCol;
            out vec4 outColor;
            void main() { 
                vec4 texColor = texture(u_texture, v_tex);
                if(texColor.a < 0.1) discard;
                vec3 norm = normalize(v_norm);
                vec3 lightDir = normalize(u_lightPos - v_fragPos);
                float diff = max(dot(norm, lightDir), 0.0);
                vec3 diffuse = diff * u_lightCol;
                vec3 ambient = vec3(u_ambientLvl);
                vec3 result = (ambient + diffuse) * texColor.rgb;
                outColor = vec4(result, texColor.a); 
            }
        `;

        function createProgram(gl, vs, fs) {
            const vS = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(vS, vs); gl.compileShader(vS);
            const fS = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(fS, fs); gl.compileShader(fS);
            const p = gl.createProgram(); gl.attachShader(p, vS); gl.attachShader(p, fS); gl.linkProgram(p);
            return p;
        }

        const program = createProgram(gl, vs, fs);
        const matLoc = gl.getUniformLocation(program, "u_matrix");
        const modelLoc = gl.getUniformLocation(program, "u_model");
        const texLoc = gl.getUniformLocation(program, "u_texture");
        const lightLoc = gl.getUniformLocation(program, "u_lightPos");
        const lightColLoc = gl.getUniformLocation(program, "u_lightCol");
        const ambLoc = gl.getUniformLocation(program, "u_ambientLvl");

        // --- GEOMETRIA: CUBO ---
        const vertices = new Float32Array([-0.5,-0.5, 0.5, 0,0, 0,0,1, 0.5,-0.5, 0.5, 1,0, 0,0,1, 0.5, 0.5, 0.5, 1,1, 0,0,1, -0.5, 0.5, 0.5, 0,1, 0,0,1, -0.5,-0.5,-0.5, 1,0, 0,0,-1, -0.5, 0.5,-0.5, 1,1, 0,0,-1, 0.5, 0.5,-0.5, 0,1, 0,0,-1, 0.5,-0.5,-0.5, 0,0, 0,0,-1, -0.5, 0.5,-0.5, 0,1, 0,1,0, -0.5, 0.5, 0.5, 0,0, 0,1,0, 0.5, 0.5, 0.5, 1,0, 0,1,0, 0.5, 0.5,-0.5, 1,1, 0,1,0, -0.5,-0.5,-0.5, 1,1, 0,-1,0, 0.5,-0.5,-0.5, 0,1, 0,-1,0, 0.5,-0.5, 0.5, 0,0, 0,-1,0, -0.5,-0.5, 0.5, 1,0, 0,-1,0, 0.5,-0.5,-0.5, 1,0, 1,0,0, 0.5, 0.5,-0.5, 1,1, 1,0,0, 0.5, 0.5, 0.5, 0,1, 1,0,0, 0.5,-0.5, 0.5, 0,0, 1,0,0, -0.5,-0.5,-0.5, 0,0, -1,0,0, -0.5,-0.5, 0.5, 1,0, -1,0,0, -0.5, 0.5, 0.5, 1,1, -1,0,0, -0.5, 0.5,-0.5, 0,1, -1,0,0 ]);
        const indices = new Uint16Array([0,1,2, 0,2,3, 4,5,6, 4,6,7, 8,9,10, 8,10,11, 12,13,14, 12,14,15, 16,17,18, 16,18,19, 20,21,22, 20,22,23]);

        const vao = gl.createVertexArray(); gl.bindVertexArray(vao);
        const vbo = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, vbo); gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
        const ebo = gl.createBuffer(); gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ebo); gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, indices, gl.STATIC_DRAW);
        gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 32, 0);
        gl.enableVertexAttribArray(1); gl.vertexAttribPointer(1, 2, gl.FLOAT, false, 32, 12);
        gl.enableVertexAttribArray(2); gl.vertexAttribPointer(2, 3, gl.FLOAT, false, 32, 20);

        // --- TEXTURAS ---
        function criarTextura(tipo) {
            const c = document.createElement('canvas'); c.width = 256; c.height = 256; const ctx = c.getContext('2d');
            if(tipo === 'parede') { ctx.fillStyle = '#9e9e9e'; ctx.fillRect(0,0,256,256);
            } else if(tipo === 'parede_ext') { ctx.fillStyle = '#ffcc80'; ctx.fillRect(0,0,256,256);
            } else if(tipo === 'chao') { ctx.fillStyle = '#5d4037'; ctx.fillRect(0,0,256,256); ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 4; for(let y=0; y<256; y+=32) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(256,y); ctx.stroke(); }
            } else if(tipo === 'grama') { ctx.fillStyle = '#2e7d32'; ctx.fillRect(0,0,256,256); ctx.fillStyle = '#1b5e20'; for(let i=0; i<100; i++) ctx.fillRect(Math.random()*256, Math.random()*256, 10, 10);
            } else if(tipo === 'item') { ctx.fillStyle = '#8d6e63'; ctx.fillRect(0,0,256,256); ctx.strokeStyle = '#4e342e'; ctx.lineWidth = 10; ctx.strokeRect(20,20,216,216); ctx.strokeRect(80,80,96,96);
            } else if(tipo === 'moveis_visuais') { ctx.fillStyle = '#a1887f'; ctx.fillRect(0,0,256,256); ctx.strokeStyle = '#4e342e'; ctx.lineWidth = 6; ctx.strokeRect(0,0,256,256); ctx.beginPath(); ctx.moveTo(0,128); ctx.lineTo(256,128); ctx.stroke();
            } else if(tipo === 'cama') { ctx.fillStyle = '#8d6e63'; ctx.fillRect(0,0,256,256); ctx.fillStyle = '#e3f2fd'; ctx.fillRect(10,10,236,200); ctx.fillStyle = '#fff'; ctx.fillRect(40,20,176,60);
            } else if(tipo === 'telhado') { ctx.fillStyle = '#5d4037'; ctx.fillRect(0,0,256,256); ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 2; for(let y=0; y<256; y+=16) { for(let x=0; x<256; x+=32) { ctx.strokeRect(x,y,32,16); } }
            } else if(tipo === 'porta_ext') { ctx.fillStyle = '#8d6e63'; ctx.fillRect(0,0,256,256); ctx.fillStyle = '#4e342e'; ctx.fillRect(20,20,216,216); ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(220, 128, 10, 0, 2*Math.PI); ctx.fill(); 
            } else if(tipo === 'pele') { ctx.fillStyle = '#ffccaa'; ctx.fillRect(0,0,256,256); 
            } else if(tipo === 'pijama') { ctx.fillStyle = '#b3e5fc'; ctx.fillRect(0,0,256,256); ctx.fillStyle = '#0288d1'; for(let y=0; y<256; y+=20) ctx.fillRect(0,y,256,4); 
            }
            const tex = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, tex); gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, c); gl.generateMipmap(gl.TEXTURE_2D); return tex;
        }

        const texturas = { parede: criarTextura('parede'), parede_ext: criarTextura('parede_ext'), chao: criarTextura('chao'), grama: criarTextura('grama'), item: criarTextura('item'), moveis_visuais: criarTextura('moveis_visuais'), cama: criarTextura('cama'), telhado: criarTextura('telhado'), porta_ext: criarTextura('porta_ext'), pele: criarTextura('pele'), pijama: criarTextura('pijama') };

        // --- ARQUITETURA DE LEVEL DESIGN E COLISÃO ---
        const paredes = [
            { x: -10, z: -10, w: 0.5, d: 26 }, 
            { x: 10, z: -10, w: 0.5, d: 26 },  
            { x: 0, z: -22.5, w: 20.5, d: 0.5 }, 
            { x: -6.125, z: 2.5, w: 8.25, d: 0.5 }, 
            { x: 6.125, z: 2.5, w: 8.25, d: 0.5 },  
            { x: -6, z: -7, w: 8, d: 0.5 }, 
            { x: 6, z: -7, w: 8, d: 0.5 },  
            { x: -6, z: -15, w: 8, d: 0.5 },
            { x: 6, z: -15, w: 8, d: 0.5 },
        ];

        const moveisFisica = [
            { x: 5, z: -2, y: 0.75, w: 4, d: 2, h: 1.5, tex: texturas.moveis_visuais, rot: 0 }, 
            { x: -5, z: -2, y: 0.5, w: 4, d: 3, h: 1, tex: texturas.moveis_visuais, rot: 0 }, 
            { x: 0, z: -11, y: 0.6, w: 6, d: 2, h: 1.2, tex: texturas.moveis_visuais, rot: 0 }, 
            { x: -8, z: -11, y: 1.5, w: 2, d: 6, h: 3, tex: texturas.moveis_visuais, rot: 0 }, 
            { x: 0, z: -20.5, y: 0.3, w: 3, d: 4, h: 0.6, tex: texturas.cama, rot: 0 }, 
        ];

        let portasInt = [
            { id: 0, hinge: [-2, 1.75, -7], width: 4, angle: 0, targetAngle: 0, aberta: false }, 
            { id: 1, hinge: [-2, 1.75, -15], width: 4, angle: 0, targetAngle: 0, aberta: false } 
        ];

        let itens = [
            { pos: [-6, 0.65, -3], roubado: false }, 
            { pos: [6, 0.65, -11], roubado: false }, 
            { pos: [7, 0.65, -20], roubado: false }  
        ];

        function colideComParedes(nx, nz) {
            let r = 0.4; 
            for(let p of paredes) if(nx+r > p.x-p.w/2 && nx-r < p.x+p.w/2 && nz+r > p.z-p.d/2 && nz-r < p.z+p.d/2) return true;
            for(let m of moveisFisica) if(nx+r > m.x-m.w/2 && nx-r < m.x+m.w/2 && nz+r > m.z-m.d/2 && nz-r < m.z+m.d/2) return true;
            for(let p of portasInt) {
                if(!p.aberta) {
                    let dw = p.width; let px = p.hinge[0] + dw/2; let pz = p.hinge[2];
                    if(nx+r > px-dw/2 && nx-r < px+dw/2 && nz+r > pz-0.3 && nz-r < pz+0.3) return true;
                }
            }
            if (ambiente === "INTERIOR" && nz > 2.0) return true;
            return false;
        }

        // --- ESTADOS DO JOGO ---
        let estadoJogo = "MENU"; 
        let ambiente = "EXTERIOR"; 
        let tempoParaAcordar = 10.0;
        let timerEntrada = 0.0;
        let cutsceneRodando = false;
        let donoDaCasa = { pos: [0, 0.6, -20.0], speed: 0.05, acordado: false }; 

        // --- CÂMERA E CONTROLES ---
        let camPos = vec3.fromValues(0, 1.7, 10); 
        let camFront = vec3.fromValues(0, 0, -1);
        let camUp = vec3.fromValues(0, 1, 0);
        let yaw = -90.0, pitch = 0.0;
        let keys = {};
        let playerControlavel = true;
        let avisoTemporario = false; 

        const uiAviso = document.getElementById("aviso");
        const uiItens = document.getElementById("hud-itens");
        const uiAmbiente = document.getElementById("hud-ambiente");

        function mostrarAvisoTemporario(texto, cor, tempo) {
            uiAviso.innerText = texto; uiAviso.style.color = cor; uiAviso.classList.remove("hidden"); avisoTemporario = true;
            setTimeout(() => { avisoTemporario = false; }, tempo);
        }

        document.getElementById("btn-iniciar").addEventListener("click", () => {
            document.getElementById("menu").classList.add("hidden");
            try { canvas.requestPointerLock(); } catch(e) {}
            
            estadoJogo = "JOGANDO"; ambiente = "EXTERIOR"; playerControlavel = true; donoDaCasa.acordado = false; cutsceneRodando = false; timerEntrada = 0.0; yaw = -90.0; pitch = 0.0; camPos = vec3.fromValues(0, 1.7, 10); donoDaCasa.pos = [0, 0.6, -20.0]; itens.forEach(i => i.roubado = false); portasInt.forEach(p => {p.aberta=false; p.targetAngle=0; p.angle=0;}); uiAmbiente.innerText = "EXTERIOR (DIA)"; uiAviso.classList.add("hidden"); uiAviso.style.color = "#ffeb3b"; uiItens.innerText = "0"; avisoTemporario = false;
        });

        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === canvas && playerControlavel) {
                yaw += e.movementX * 0.1; pitch -= e.movementY * 0.1;
                if (pitch > 89.0) pitch = 89.0; if (pitch < -89.0) pitch = -89.0;
            }
        });

        window.onkeydown = e => { keys[e.key.toLowerCase()] = true; if(estadoJogo === "JOGANDO" && playerControlavel) processarAcaoKeys(e); };
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;

        function processarAcaoKeys(e) {
            let key = e.key.toLowerCase();
            if(key === 'f') {
                if (ambiente === "EXTERIOR" && vec3.distance(camPos, [0, 1.7, 2.5]) < 4.0) {
                    ambiente = "INTERIOR"; uiAmbiente.innerText = "INTERIOR DA CASA (SHHH!)"; camPos = vec3.fromValues(0, 1.7, 1.5); timerEntrada = performance.now();
                } 
                else if (ambiente === "INTERIOR" && vec3.distance(camPos, [0, 1.7, 2.5]) < 4.0) { 
                    if(itens.filter(i => i.roubado).length === itens.length) finalizarJogo("VITORIA");
                    else mostrarAvisoTemporario("Você precisa roubar os 3 itens primeiro!", "#f44336", 2000);
                }
                
                if(ambiente === "INTERIOR") {
                    portasInt.forEach(p => {
                        let cx = p.hinge[0] + p.width/2;
                        if(vec3.distance(camPos, [cx, 1.7, p.hinge[2]]) < 4.0) {
                            p.aberta = !p.aberta; p.targetAngle = p.aberta ? Math.PI/2 : 0;
                        }
                    });
                }
            }
            
            if(key === 'e' && ambiente === "INTERIOR") {
                itens.forEach(item => { 
                    if(!item.roubado && vec3.distance(camPos, item.pos) < 3.0) { 
                        item.roubado = true; let roubados = itens.filter(i => i.roubado).length; uiItens.innerText = roubados; 
                        if(roubados === itens.length) mostrarAvisoTemporario("TUDO ROUBADO! FUJA PELA PORTA DA FRENTE!", "#4caf50", 4000);
                    } 
                });
            }
        }

        function finalizarJogo(resultado) { 
            estadoJogo = resultado; document.exitPointerLock(); document.getElementById("menu").classList.remove("hidden"); document.getElementById("btn-iniciar").innerText = "JOGAR NOVAMENTE"; 
            if(resultado === "GAMEOVER") { 
                document.getElementById("titulo-tela").innerText = "GAME OVER"; document.getElementById("desc-tela").innerText = "O velho te pegou!"; document.getElementById("titulo-tela").style.color = "#d32f2f"; 
            } else { 
                document.getElementById("titulo-tela").innerText = "MISSÃO CUMPRIDA"; document.getElementById("desc-tela").innerText = "Você roubou tudo e fugiu com sucesso!"; document.getElementById("titulo-tela").style.color = "#4caf50"; 
            } 
        }

        // --- BLINDAGEM CONTRA O TYPE-ERROR ---
        function desenhaObjeto(vpMatrix, pos, scale, texturaObj, rotY = 0) {
            // Previne falha do WebGL se um parametro demorar 1 milissegundo pra entrar na RAM
            if (!vpMatrix || !pos || !scale || pos.length < 3 || scale.length < 3) return; 

            gl.activeTexture(gl.TEXTURE0); 
            gl.bindTexture(gl.TEXTURE_2D, texturaObj); 
            if (texLoc !== null) gl.uniform1i(texLoc, 0);

            let model = mat4.create(); 
            mat4.translate(model, model, pos); 
            mat4.rotateY(model, model, rotY || 0); 
            mat4.scale(model, model, scale);
            
            let mvp = mat4.create(); 
            mat4.multiply(mvp, vpMatrix, model);

            // Evita o erro de INVALID_OPERATION se o shader piscar
            if (matLoc !== null) gl.uniformMatrix4fv(matLoc, false, mvp); 
            if (modelLoc !== null) gl.uniformMatrix4fv(modelLoc, false, model); 
            
            gl.drawElements(gl.TRIANGLES, 36, gl.UNSIGNED_SHORT, 0);
        }

        function desenhaParteCorpo(vp, basePos, localOffset, scale, tex, rotY) {
            if (!basePos || basePos.length < 3) return; // Segurança extra pra não bugar a matemática
            let gx = basePos[0] + localOffset[0] * Math.cos(rotY) + localOffset[2] * Math.sin(rotY);
            let gz = basePos[2] - localOffset[0] * Math.sin(rotY) + localOffset[2] * Math.cos(rotY);
            let gy = basePos[1] + localOffset[1];
            desenhaObjeto(vp, [gx, gy, gz], scale, tex, rotY);
        }

        function desenhaVelhinho(vp, pos, acordado, rotY, now) {
            if (!acordado) {
                desenhaParteCorpo(vp, pos, [0, 0.4, 0.6], [0.4, 0.4, 0.4], texturas.pele, rotY); 
                desenhaParteCorpo(vp, pos, [0, 0.35, 0], [0.6, 0.3, 0.8], texturas.pijama, rotY); 
                desenhaParteCorpo(vp, pos, [0, 0.35, -0.6], [0.5, 0.25, 0.6], texturas.pijama, rotY); 
            } else {
                let walkAnim = Math.sin((now || 0) / 150) * 0.4; // Trata se o frame não entregar o NOW a tempo
                desenhaParteCorpo(vp, pos, [0, 1.4, 0], [0.4, 0.4, 0.4], texturas.pele, rotY); 
                desenhaParteCorpo(vp, pos, [0, 0.8, 0], [0.6, 0.8, 0.4], texturas.pijama, rotY); 
                desenhaParteCorpo(vp, pos, [-0.2, 0.3, walkAnim], [0.3, 0.6, 0.3], texturas.pijama, rotY); 
                desenhaParteCorpo(vp, pos, [0.2, 0.3, -walkAnim], [0.3, 0.6, 0.3], texturas.pijama, rotY); 
                desenhaParteCorpo(vp, pos, [-0.4, 1.0, 0.3], [0.2, 0.2, 0.6], texturas.pele, rotY); 
                desenhaParteCorpo(vp, pos, [0.4, 1.0, 0.3], [0.2, 0.2, 0.6], texturas.pele, rotY); 
            }
        }

        function rodarCutsceneAcordar() {
            if(cutsceneRodando) return;
            cutsceneRodando = true; estadoJogo = "CUTSCENE"; playerControlavel = false;
            let dx = donoDaCasa.pos[0] - camPos[0], dz = donoDaCasa.pos[2] - camPos[2], dy = donoDaCasa.pos[1] - camPos[1];
            yaw = Math.atan2(dz, dx) * (180 / Math.PI); pitch = Math.atan2(dy, Math.sqrt(dx*dx + dz*dz)) * (180 / Math.PI);
            
            uiAviso.innerText = "... *Zzz* ... Huh? ... Tem um barulho aí?"; 
            uiAviso.style.color = "#fff"; 
            uiAviso.classList.remove("hidden");

            setTimeout(() => { 
                donoDaCasa.pos[1] = 0.0; 
                donoDaCasa.pos[2] = -17.5; 
                uiAviso.innerText = "LADRÃO! EU VOU TE PEGAR!"; 
                uiAviso.style.color = "#f44336"; 
            }, 3000);

            setTimeout(() => { 
                uiAviso.classList.add("hidden"); 
                donoDaCasa.acordado = true; 
                playerControlavel = true; 
                estadoJogo = "JOGANDO"; 
            }, 6000);
        }

        function render(now) {
            requestAnimationFrame(render);
            
            if (estadoJogo === "JOGANDO") {
                if (ambiente === "INTERIOR" && !donoDaCasa.acordado && !cutsceneRodando && ((now - timerEntrada)/1000 > tempoParaAcordar)) rodarCutsceneAcordar();

                if (ambiente === "INTERIOR" && donoDaCasa.acordado) {
                    let alvoX = camPos[0]; let alvoZ = camPos[2];
                    if (donoDaCasa.pos[2] < -15.5 && camPos[2] > -14.5) { alvoX = 0; alvoZ = -14; }
                    else if (donoDaCasa.pos[2] < -7.5 && camPos[2] > -6.5) { alvoX = 0; alvoZ = -6; }

                    let dirX = alvoX - donoDaCasa.pos[0], dirZ = alvoZ - donoDaCasa.pos[2];
                    let dist = Math.sqrt(dirX * dirX + dirZ * dirZ);
                    
                    if (dist > 0.1) {
                        let ex = donoDaCasa.pos[0] + (dirX / dist) * donoDaCasa.speed;
                        let ez = donoDaCasa.pos[2] + (dirZ / dist) * donoDaCasa.speed;
                        if(!colideComParedes(ex, donoDaCasa.pos[2])) donoDaCasa.pos[0] = ex;
                        if(!colideComParedes(donoDaCasa.pos[0], ez)) donoDaCasa.pos[2] = ez;
                    }
                    
                    portasInt.forEach(p => {
                        let cx = p.hinge[0] + p.width/2;
                        let distToDoor = Math.sqrt(Math.pow(donoDaCasa.pos[0]-cx, 2) + Math.pow(donoDaCasa.pos[2]-p.hinge[2], 2));
                        if(distToDoor < 4.5) { 
                            p.aberta = true; p.targetAngle = Math.PI/2;
                        }
                    });

                    let distRealPlayer = Math.sqrt(Math.pow(camPos[0]-donoDaCasa.pos[0], 2) + Math.pow(camPos[2]-donoDaCasa.pos[2], 2));
                    if(distRealPlayer < 1.3) finalizarJogo("GAMEOVER");
                }

                let front = vec3.create(); front[0] = Math.cos(glMatrix.toRadian(yaw)) * Math.cos(glMatrix.toRadian(pitch)); front[1] = Math.sin(glMatrix.toRadian(pitch)); front[2] = Math.sin(glMatrix.toRadian(yaw)) * Math.cos(glMatrix.toRadian(pitch)); vec3.normalize(camFront, front);
                if (playerControlavel) {
                    let camRight = vec3.create(); vec3.cross(camRight, camFront, camUp); vec3.normalize(camRight, camRight);
                    let tempFront = vec3.fromValues(camFront[0], 0, camFront[2]); vec3.normalize(tempFront, tempFront);
                    let spd = 0.15; 
                    let dx = 0, dz = 0;
                    if(keys['w']) { dx += tempFront[0]*spd; dz += tempFront[2]*spd; } if(keys['s']) { dx -= tempFront[0]*spd; dz -= tempFront[2]*spd; }
                    if(keys['a']) { dx -= camRight[0]*spd; dz -= camRight[2]*spd; } if(keys['d']) { dx += camRight[0]*spd; dz += camRight[2]*spd; }
                    
                    if(ambiente === "INTERIOR"){ 
                        if(!colideComParedes(camPos[0] + dx, camPos[2])) camPos[0] += dx;
                        if(!colideComParedes(camPos[0], camPos[2] + dz)) camPos[2] += dz;
                    } else { camPos[0] += dx; camPos[2] += dz; }
                }
            } else if (estadoJogo === "CUTSCENE") {
                vec3.set(camFront, Math.cos(glMatrix.toRadian(yaw)) * Math.cos(glMatrix.toRadian(pitch)), Math.sin(glMatrix.toRadian(pitch)), Math.sin(glMatrix.toRadian(yaw)) * Math.cos(glMatrix.toRadian(pitch))); vec3.normalize(camFront, camFront);
            } else { return; }

            let exibirDicaFixa = false;
            if(estadoJogo === "JOGANDO" && playerControlavel && !avisoTemporario) {
                let pertoPortaInterna = portasInt.some(p => vec3.distance(camPos, [p.hinge[0] + p.width/2, 1.7, p.hinge[2]]) < 4.0);
                if(ambiente === "EXTERIOR" && vec3.distance(camPos, [0, 1.7, 2.5]) < 4.0) { 
                    uiAviso.innerText = "Aperte [F] para arrombar e entrar"; uiAviso.style.color="#ffeb3b"; uiAviso.classList.remove("hidden"); exibirDicaFixa = true;
                } else if (ambiente === "INTERIOR" && vec3.distance(camPos, [0, 1.7, 2.5]) < 4.0 && itens.filter(i => i.roubado).length === itens.length) { 
                    uiAviso.innerText = "Aperte [F] para escapar com os itens!"; uiAviso.style.color="#4caf50"; uiAviso.classList.remove("hidden"); exibirDicaFixa = true;
                } else if (ambiente === "INTERIOR" && pertoPortaInterna) {
                    uiAviso.innerText = "Aperte [F] para abrir/fechar a porta"; uiAviso.style.color="#ffeb3b"; uiAviso.classList.remove("hidden"); exibirDicaFixa = true;
                } else if (ambiente === "INTERIOR" && itens.some(i => !i.roubado && vec3.distance(camPos, i.pos) < 3.0)) { 
                    uiAviso.innerText = "Aperte [E] para roubar o caixote"; uiAviso.style.color="#ffeb3b"; uiAviso.classList.remove("hidden"); exibirDicaFixa = true;
                } 
            }
            
            if (!exibirDicaFixa && !avisoTemporario && estadoJogo !== "CUTSCENE") {
                uiAviso.classList.add("hidden");
            }

            // --- RENDER COM LUZ FIXA E CLARA ---
            canvas.width = window.innerWidth || 300; 
            canvas.height = window.innerHeight || 150; 
            gl.viewport(0, 0, canvas.width, canvas.height);
            
            if (ambiente === "EXTERIOR") { 
                gl.clearColor(0.5, 0.7, 0.9, 1.0); 
                if (ambLoc !== null) gl.uniform1f(ambLoc, 0.85); 
                if (lightColLoc !== null) gl.uniform3fv(lightColLoc, [1,1,1]); 
                if (lightLoc !== null) gl.uniform3fv(lightLoc, [10, 20, 10]);
            } else { 
                gl.clearColor(0.05, 0.05, 0.05, 1.0); 
                if (ambLoc !== null) gl.uniform1f(ambLoc, donoDaCasa.acordado ? 0.6 : 0.5); 
                if (lightColLoc !== null) gl.uniform3fv(lightColLoc, donoDaCasa.acordado ? [1.0, 0.4, 0.4] : [1.0, 1.0, 0.9]); 
                if (lightLoc !== null) gl.uniform3fv(lightLoc, [0, 4.0, -10]); 
            }
            
            gl.enable(gl.DEPTH_TEST); 
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT); 
            gl.useProgram(program);

            const proj = mat4.create(); 
            mat4.perspective(proj, 45 * Math.PI / 180, canvas.width/canvas.height, 0.1, 100);
            
            const view = mat4.create(); 
            let target = vec3.create(); 
            vec3.add(target, camPos, camFront); 
            mat4.lookAt(view, camPos, target, camUp);
            
            const vp = mat4.create(); 
            mat4.multiply(vp, proj, view);

            desenhaObjeto(vp, [0, -0.5, 5], [120, 1, 60], texturas.grama);
            desenhaObjeto(vp, [0, 5.5, -10], [20.5, 1, 26], texturas.telhado);

            if (ambiente === "EXTERIOR") {
                paredes.forEach(p => desenhaObjeto(vp, [p.x, 2.5, p.z], [p.w, 5, p.d], texturas.parede_ext));
                desenhaObjeto(vp, [0, 1.75, 2.55], [4, 3.5, 0.1], texturas.porta_ext); 
                desenhaObjeto(vp, [0, 0.1, 3.5], [3, 0.1, 2], texturas.moveis_visuais, Math.PI/2);
            } else {
                desenhaObjeto(vp, [0, -0.45, -10], [20.5, 1, 26], texturas.chao); 
                desenhaObjeto(vp, [0, 5, -10], [20.5, 1, 26], texturas.parede); 
                
                paredes.forEach(p => desenhaObjeto(vp, [p.x, 2.5, p.z], [p.w, 5, p.d], texturas.parede));
                moveisFisica.forEach(m => desenhaObjeto(vp, [m.x, m.y, m.z], [m.w, m.h, m.d], m.tex || texturas.moveis_visuais, m.rot));

                portasInt.forEach(p => {
                    p.angle += (p.targetAngle - p.angle) * 0.1; 
                    let cx = p.hinge[0] + Math.cos(p.angle) * (p.width/2);
                    let cz = p.hinge[2] - Math.sin(p.angle) * (p.width/2);
                    desenhaObjeto(vp, [cx, p.hinge[1], cz], [p.width, 3.5, 0.2], texturas.porta_ext, p.angle);
                });

                desenhaObjeto(vp, [0, 1.75, 2.45], [4, 3.5, 0.1], texturas.porta_ext); 

                let rotYDono = donoDaCasa.acordado ? yaw * (Math.PI/180) + Math.PI : Math.PI / 2;
                desenhaVelhinho(vp, donoDaCasa.pos, donoDaCasa.acordado, rotYDono, now);

                itens.forEach(item => { if(!item.roubado) desenhaObjeto(vp, item.pos, [1.3, 1.3, 1.3], texturas.item); });
            }
        }
        requestAnimationFrame(render);
    </script>
</body>
</html>
